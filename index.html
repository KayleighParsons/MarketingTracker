<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zip-Clip Marketing Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#FF8200;
    --orange-deep:#D9670A;
    --amber:#FFB74D;
    --charcoal:#3C3A3C;
    --charcoal-2:#2A2829;
    --charcoal-soft:#615F60;
    --border:#E7E1D6;
    --bg:#FAF7F1;
    --uk:#1F7A66;
    --uk-tint:#1F7A6614;
    --eu:#FF8200;
    --eu-tint:#FF820014;
    --intl:#2F5F8A;
    --intl-tint:#2F5F8A14;
    --radius:14px;
    --radius-sm:9px;
    --cut:16px;
    --shadow:0 1px 2px rgba(60,58,60,.05), 0 6px 20px rgba(60,58,60,.07);
  }
  .cut{clip-path:polygon(0 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% 100%, 0 100%);}
  .cut-sm{--cut:11px;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);font-family:'Open Sans',sans-serif;color:var(--charcoal);font-size:14.5px;line-height:1.5;}
  h1,h2,h3,.kanit{font-family:'Kanit',sans-serif;}

  /* ---- Header ---- */
  header.top{background:var(--charcoal);padding:18px 22px 16px;}
  .eyebrow{color:var(--orange);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;}
  header.top h1{color:#fff;font-size:21px;margin:2px 0 0;font-weight:700;}
  .headrow{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;}
  .saved-note{color:#7CD9B8;font-size:12px;opacity:0;transition:opacity .3s;align-self:center;}
  .saved-note.show{opacity:1;}

  .control-row{margin-top:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .pills{position:relative;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .pill{border-radius:999px;padding:5px 13px;font-size:11.5px;font-weight:600;border:1px solid #ffffff30;background:#ffffff0d;color:#fff;cursor:pointer;white-space:nowrap;font-family:'Open Sans',sans-serif;}
  .pill.active{color:#fff;background:var(--orange);border-color:var(--orange);}
  .person-pill{border-radius:999px;padding:6px 16px 6px 6px;font-size:12.5px;font-weight:700;border:1px solid #ffffff30;background:#ffffff0d;color:#fff;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Kanit',sans-serif;}
  .person-pill .avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#fff;color:var(--charcoal);}
  .person-pill.active{background:var(--orange);border-color:var(--orange);}
  .person-pill.active .avatar{background:#fff;color:var(--orange);}

  .tools-menu{position:relative;}
  .tools-toggle{width:34px;height:34px;border-radius:999px;border:1px solid #ffffff30;background:#ffffff0d;color:#fff;font-size:16px;font-weight:700;cursor:pointer;line-height:1;}
  .tools-toggle:hover{background:#ffffff1f;}
  .tools-panel{display:none;flex-direction:column;gap:6px;position:absolute;right:0;top:42px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:10px;z-index:60;min-width:210px;}
  .tools-panel.open{display:flex;}
  .tools-panel .header-btn{background:#fff;color:var(--charcoal);border:1px solid var(--border);text-align:left;border-radius:8px;padding:8px 10px;font-family:'Kanit',sans-serif;font-weight:600;font-size:12px;cursor:pointer;}
  .tools-panel .header-btn.solid{background:var(--orange);color:#fff;border-color:var(--orange);}
  .tools-panel .header-btn:hover{background:#F5F3F0;}
  .tools-panel .header-btn.solid:hover{opacity:.92;background:var(--orange);}

  /* ---- Nav ---- */
  nav.tabs{display:flex;gap:6px;overflow-x:auto;overflow-y:visible;padding:10px 22px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;align-items:center;}
  nav.tabs button{border:1px solid transparent;background:transparent;color:var(--charcoal-soft);font-family:'Kanit',sans-serif;font-weight:600;font-size:12.5px;padding:8px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
  nav.tabs button:hover{background:#F5F3F0;}
  nav.tabs button.active{background:var(--charcoal);color:#fff;}
  .more-menu{position:relative;}
  .more-toggle{border:1px solid transparent;background:transparent;color:var(--charcoal-soft);font-family:'Kanit',sans-serif;font-weight:600;font-size:12.5px;padding:8px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;}
  .more-toggle:hover{background:#F5F3F0;}
  .more-toggle.active{background:var(--charcoal);color:#fff;}
  .more-panel{display:none;flex-direction:column;gap:2px;position:absolute;left:0;top:42px;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:6px;z-index:60;min-width:190px;}
  .more-panel.open{display:flex;}
  .more-panel button{width:100%;justify-content:flex-start;border-radius:8px;padding:9px 10px;}
  .more-panel button.active{background:var(--bg);color:var(--charcoal);font-weight:700;}
  .search-box{margin-left:8px;}

  main{max-width:920px;margin:0 auto;padding:22px 22px 60px;}

  /* ---- Section header / cards ---- */
  .section-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .section-title{display:flex;align-items:center;gap:12px;}
  .badge-icon{width:38px;height:38px;border-radius:11px;background:#FFF1E0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;}
  .section-title h2{font-size:19px;margin:0;font-weight:700;line-height:1.2;}
  .section-title p{margin:2px 0 0;font-size:12.5px;color:var(--charcoal-soft);}

  .btn{background:var(--orange);color:#fff;border:none;font-family:'Kanit',sans-serif;font-weight:600;font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{opacity:.9;}
  .btn.secondary{background:#fff;color:var(--charcoal);border:1px solid var(--border);}
  .btn.small{padding:6px 12px;font-size:12px;}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
  .card{border:1px solid var(--border);background:#fff;clip-path:polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);padding:14px 16px;text-align:left;cursor:pointer;filter:drop-shadow(0 1px 2px rgba(60,58,60,.05)) drop-shadow(0 6px 16px rgba(60,58,60,.06));transition:transform .12s ease;}
  .card:hover{transform:translateY(-1px);}
  .card > div:first-child{color:inherit;}
  .card .num{font-size:28px;font-weight:700;font-family:'Kanit',sans-serif;margin:5px 0 0;}
  .card .lbl{font-size:11.5px;color:var(--charcoal-soft);}

  /* ---- Icon system ---- */
  .icon{width:19px;height:19px;flex-shrink:0;}
  .icon-sm{width:15px;height:15px;}
  .badge-icon .icon{width:20px;height:20px;}
  nav.tabs button .icon,.more-panel button .icon{color:inherit;}
  .tag.translate{display:inline-flex;align-items:center;gap:4px;}
  .icon-btn{display:inline-flex;align-items:center;justify-content:center;}

  .grid2{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:720px){.grid2{grid-template-columns:1fr 1fr;}}
  .grid3{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:720px){.grid3{grid-template-columns:1fr 1fr;}}
  @media(min-width:1040px){.grid3{grid-template-columns:1fr 1fr 1fr;}}
  .panel{border:1px solid var(--border);background:#fff;clip-path:polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 0 100%);padding:19px 20px 19px 19px;filter:drop-shadow(0 1px 2px rgba(60,58,60,.05)) drop-shadow(0 6px 20px rgba(60,58,60,.06));}
  .panel h3{font-size:13.5px;margin:0 0 12px;font-family:'Kanit',sans-serif;font-weight:700;}
  .empty{color:var(--charcoal-soft);font-size:13px;font-style:italic;text-align:center;padding:20px 0;}

  details.month{border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);}
  details.month summary{padding:13px 16px;cursor:pointer;font-family:'Kanit',sans-serif;font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;list-style:none;}
  details.month summary::-webkit-details-marker{display:none;}
  .month-count{background:var(--bg);color:var(--charcoal-soft);font-size:11px;padding:3px 10px;border-radius:999px;font-weight:700;}

  .item{border-top:1px solid var(--border);padding:14px 16px;}
  .item.jump-highlight{background:#FFF1E0;box-shadow:inset 3px 0 0 var(--orange);transition:background 2.5s ease;}
  details.month .item:first-of-type{border-top:1px solid var(--border);}
  .item-row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;}
  .item-title{font-family:'Kanit',sans-serif;font-weight:600;font-size:14px;}
  .item-meta{color:var(--charcoal-soft);font-size:12px;margin-top:5px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;border:none;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
  .tag.region-UK{color:var(--uk);background:var(--uk-tint);}
  .tag.region-EU{color:var(--eu);background:var(--eu-tint);}
  .tag.region-International{color:var(--intl);background:var(--intl-tint);}
  .tag.cat{background:#F1EFEC;color:var(--charcoal-soft);}
  .tag.translate{background:#FFF1E0;color:#B5590A;}
  select,input[type=text],input[type=date]{border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-family:'Open Sans',sans-serif;background:#fff;}
  .item-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .icon-btn{border:none;background:none;color:var(--charcoal-soft);cursor:pointer;padding:5px;border-radius:6px;}
  .icon-btn:hover{background:var(--bg);}
  .editrow{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border);gap:8px;flex-wrap:wrap;align-items:center;}
  .editrow.open{display:flex;}
  .checklabel{font-size:11px;color:var(--charcoal-soft);display:flex;align-items:center;gap:4px;}

  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-head{font-size:11px;font-weight:600;color:var(--charcoal-soft);text-align:center;padding-bottom:4px;}
  .cal-cell{border:1px solid var(--border);border-radius:9px;min-height:64px;padding:5px;background:#fff;}
  .cal-cell.today{border-color:var(--orange);border-width:2px;}
  .cal-day{font-size:11px;font-weight:600;color:var(--charcoal-soft);}
  .cal-cell.today .cal-day{color:var(--orange);}
  .cal-item{font-size:9px;padding:1px 4px;border-radius:4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cal-nav{display:flex;align-items:center;gap:8px;}
  .cal-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--charcoal-soft);}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
  .footer-note{text-align:center;font-size:11px;color:var(--charcoal-soft);padding:24px 24px 44px;max-width:600px;margin:0 auto;}
  textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px;font-family:'Open Sans',sans-serif;font-size:12px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--charcoal);color:#fff;padding:9px 18px;border-radius:999px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:80;box-shadow:var(--shadow);}
  .toast.show{opacity:1;}
  .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{border:1px solid var(--border);background:#fff;font-size:11.5px;padding:6px 13px;border-radius:999px;cursor:pointer;color:var(--charcoal-soft);font-weight:600;}
  .chip.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}

  .region-bar{display:flex;align-items:center;gap:8px;padding:11px 22px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .region-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--charcoal-soft);margin-right:2px;}
  .region-chip{border:1px solid var(--rc);color:var(--rc);background:#fff;}
  .region-chip.active{background:var(--rc);color:#fff;border-color:var(--rc);}
  @media(max-width:600px){.region-bar{padding:10px 16px;}}
  .stack{display:flex;flex-direction:column;gap:10px;}
  .idea-row,.trend-row{border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;background:#fff;display:flex;justify-content:space-between;gap:8px;align-items:center;box-shadow:var(--shadow);}
  .auto-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;background:#fff;margin-bottom:12px;box-shadow:var(--shadow);}
  .prompt-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:11px;white-space:pre-wrap;margin-top:8px;color:var(--charcoal-soft);}
  .chart-wrap{position:relative;height:200px;}
  .chart-wrap.tall{height:220px;}

  /* ---- Today / hero / priorities / checklist / quick actions ---- */
  .hero{background:linear-gradient(135deg,var(--charcoal) 0%,var(--charcoal-2) 100%);clip-path:polygon(0 0, calc(100% - 26px) 0, 100% 26px, 100% 100%, 0 100%);padding:28px 30px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden;}
  .hero::before{content:"";position:absolute;inset:0;opacity:.5;background-image:repeating-linear-gradient(115deg, transparent 0 38px, #ffffff14 38px 39px);pointer-events:none;}
  .hero::after{content:"";position:absolute;right:-50px;top:-50px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,#FF820038,transparent 70%);}
  .hero .greeting{font-family:'Kanit',sans-serif;font-size:25px;font-weight:700;margin:0;}
  .hero .subline{font-size:13.5px;color:#D8D6D4;margin-top:5px;}
  .hero .hero-stats{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap;}
  .hero .hero-stat .n{font-family:'Kanit',sans-serif;font-size:30px;font-weight:700;color:var(--orange);}
  .hero .hero-stat.warn .n{color:#FF9B6B;}
  .hero .hero-stat .l{font-size:11.5px;color:#D8D6D4;margin-top:3px;}

  .priority-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;cursor:pointer;border:1px solid var(--border);margin-bottom:7px;background:#fff;transition:border-color .12s;}
  .priority-item:hover{border-color:var(--orange);}
  .priority-item .pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .priority-item .ptitle{font-family:'Kanit',sans-serif;font-weight:600;font-size:13.5px;flex:1;}
  .priority-item .pmeta{font-size:11.5px;color:var(--charcoal-soft);}
  .priority-item .pdue{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .priority-item .pdue.overdue{background:#FFE5E5;color:#B33A3A;}
  .priority-item .pdue.soon{background:#FFF1E0;color:#B5590A;}

  .check-item{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--border);font-size:13.5px;cursor:pointer;}
  .check-item:last-child{border-bottom:none;}
  .check-item input{width:17px;height:17px;accent-color:var(--orange);cursor:pointer;}
  .check-item.done label{text-decoration:line-through;color:var(--charcoal-soft);}
  .check-item label{cursor:pointer;flex:1;}

  .qa-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;}
  .qa-card{border:1px solid var(--border);background:#fff;clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);padding:16px 17px 16px 15px;display:flex;flex-direction:column;gap:7px;filter:drop-shadow(0 1px 2px rgba(60,58,60,.05)) drop-shadow(0 6px 16px rgba(60,58,60,.06));}
  .qa-card .qa-icon{font-size:20px;}
  .qa-card .qa-title{font-family:'Kanit',sans-serif;font-weight:700;font-size:13.5px;}
  .qa-card .qa-desc{font-size:11.5px;color:var(--charcoal-soft);flex:1;}
  .qa-card button{margin-top:4px;align-self:flex-start;}

  @media(max-width:600px){
    header.top{padding:16px 16px 14px;}
    nav.tabs{padding:10px 16px;}
    main{padding:18px 16px 50px;}
    .hero{padding:20px;}
  }

</style>
</head>
<body>
<header class="top">
  <div class="headrow">
    <div>
      <div class="eyebrow">Zip-Clip Marketing</div>
      <h1>Command dashboard</h1>
    </div>
    <span class="saved-note" id="savedNote">Exported</span>
  </div>
  <div class="control-row">
    <div class="pills" id="personPills"></div>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<div class="region-bar" id="regionBar"></div>

<main id="main"></main>

<div class="footer-note">Your master spreadsheet is the source of truth. Edit it, then use "Import master (.xlsx)" above to refresh this dashboard. "Export master (.xlsx)" saves your in-dashboard edits back out to that same format.</div>
<div class="toast" id="toast"></div>

// ---------- Capacity planning ----------
// Working days: 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
const WORKING_DAYS = { Kayleigh: [1,2,3,4,5], Katie: [1,2,3] };
const DAILY_CAPACITY_HOURS = 7.5;
const HOUR_PRESETS = [["Quick", 1], ["Half day", 4], ["Full day", 8]];

function capacityOn(person, isoDate) {
  if (!isoDate) return 0;
  const dow = new Date(isoDate + "T00:00:00").getDay();
  const days = WORKING_DAYS[person];
  return days && days.includes(dow) ? DAILY_CAPACITY_HOURS : 0;
}
function hoursDueOn(isoDate, person) {
  const itemHours = state.items
    .filter(i => (i.workDate || i.deadline) === isoDate && i.status !== "Complete" && i.status !== "Cancelled" && inRegion(i.region))
    .filter(i => person === "Overview" || i.owner === person)
    .reduce((sum, i) => sum + (Number(i.estimatedHours) || 0), 0);
  const apptHours = state.appointments
    .filter(a => a.date === isoDate && apptForPerson(a, person))
    .reduce((sum, a) => sum + appointmentHours(a), 0);
  return itemHours + apptHours;
}
function capacityHint(person, isoDate, extraHours) {
  if (!person || person === "Overview" || !isoDate) return "";
  const dow = new Date(isoDate + "T00:00:00").getDay();
  const cap = capacityOn(person, isoDate);
  const already = hoursDueOn(isoDate, person);
  const total = already + (Number(extraHours) || 0);
  if (cap === 0) return `<span style="color:#B33A3A;">${person} isn't available that day (${new Date(isoDate+"T00:00:00").toLocaleDateString("en-GB",{weekday:"long"})}).</span>`;
  if (total > cap) return `<span style="color:#B33A3A;">Tight: ${total}h due that day, ${cap}h capacity (over by ${(total-cap).toFixed(1)}h).</span>`;
  return `<span style="color:#1F7A66;">Fits fine: ${total}h of ${cap}h capacity that day.</span>`;
}

// Sends a rolling 30-day snapshot of team capacity to the Capacity tab, via the
// same Apps Script that receives job requests, so the public request form can
// show whoever's submitting a request how booked up the team already is before
// they pick a deadline. Fire-and-forget, runs silently in the background.
function publishCapacitySnapshot() {
  if (!state.appsScriptUrl) return;
  const days = [];
  const start = new Date(todayISO() + "T00:00:00");
  for (let i = 0; i < 30; i++) {
    const d = new Date(start); d.setDate(d.getDate() + i);
    const iso = d.toISOString().slice(0, 10);
    const cap = Object.keys(WORKING_DAYS).reduce((s,p) => s + capacityOn(p, iso), 0);
    const due = hoursDueOn(iso, "Overview");
    days.push({ date: iso, due, cap });
  }
  fetch(state.appsScriptUrl, {
    method: "POST", mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ type: "capacity", days })
  }).catch(() => {});
}

const daysUntil = (iso) => {
  if (!iso) return null;
  const d = new Date(iso + "T00:00:00");
  const t = new Date(todayISO() + "T00:00:00");
  return Math.round((d - t) / 86400000);
};
const isOverdue = (deadline) => {
  const days = daysUntil(deadline);
  return days !== null && days < 0;
};
const itemIsOverdue = (i) => isOverdue(i.deadline) && i.status !== "Complete" && i.status !== "Cancelled" && i.status !== "On Hold";
const daysLabel = (days) => {
  if (days === null) return "";
  if (days < 0) return `${Math.abs(days)} days overdue`;
  if (days === 0) return "Due today";
  if (days === 1) return "Due tomorrow";
  return `${days} days left`;
};

}

function quickActionsFor(person) {
  const workable = state.items.filter(i => i.status !== "Complete" && i.status !== "Cancelled" && inRegion(i.region));
  const mine = workable.filter(i => inPerson(i.owner));
  const overdue = mine.filter(i => itemIsOverdue(i));
  const socialsDue = state.items.filter(i => i.category === "Social Post" && inRegion(i.region) && inPerson(i.owner) && i.status !== "Complete" && i.status !== "Cancelled").slice(0, 5);
  const topOverdue = overdue[0];

  const all = [
    {
      id: "qa-digest", icon: icon('digest'), title: "Copy morning digest",
      desc: "A plain-text summary of today's priorities, ready to paste into Slack or email.",
      roles: ["Overview", "Kayleigh", "Katie"], type: "inline",
      text: () => {
        const lines = [`Morning digest \u2013 ${new Date().toLocaleDateString("en-GB")} \u2013 ${person === "Overview" ? "Team" : person}`, ""];
        lines.push(`Overdue: ${overdue.length}`, `Open items: ${mine.length}`, "");
        if (overdue.length) { lines.push("Overdue items:"); overdue.slice(0, 8).forEach(i => lines.push(`- ${i.title} (${daysLabel(daysUntil(i.deadline))})`)); }
        else lines.push("No overdue items \u2013 nice work.");
        return lines.join("\n");
      }
    },
    {
      id: "qa-social", icon: icon('megaphone'), title: "Draft today's social post",
      desc: "Prompt pre-filled with brand guidelines and the next queued post.",
      roles: ["Overview", "Kayleigh", "Katie"], type: "prompt",
      text: () => `You're writing a social media post for Zip-Clip Ltd, a Welsh manufacturer of wire rope suspension systems for MEP/M&E applications. Brand voice: clear, plain, no hype, no em dashes. Colours #FF8200 and #3C3A3C, fonts Kanit and Open Sans (for reference only, not needed in copy).\n\n${socialsDue.length ? `Next queued post: "${socialsDue[0].title}"${socialsDue[0].platform ? ` for ${socialsDue[0].platform}` : ""}.` : "No specific post queued \u2013 suggest a relevant topic."}\n\nWrite one on-brand post (2-3 short sentences plus a call to action) ready to schedule.`
    },
    {
      id: "qa-followup", icon: icon('mail'), title: "Draft follow-up email",
      desc: "Chase email for the top overdue item, ready to personalise and send.",
      roles: ["Overview", "Kayleigh", "Katie"], type: "prompt",
      text: () => `Draft a short, polite follow-up email chasing progress on: "${topOverdue ? topOverdue.title : "[add task]"}". Keep it brief, friendly and direct, in Zip-Clip's plain, no-hype tone. No em dashes. Sign off as ${person === "Overview" ? "[name]" : person}.`
    },
    {
      id: "qa-overdue-nudge", icon: icon('bell'), title: "Draft overdue reminder",
      desc: "Internal nudge summarising overdue items across the team.",
      roles: ["Overview", "Kayleigh"], type: "prompt",
      text: () => `Draft a short, friendly internal reminder message about these overdue marketing items, prompting whoever owns each one to update status or flag a blocker:\n\n${overdue.slice(0, 10).map(i => `- ${i.title} (owner: ${i.owner || "unassigned"}, ${daysLabel(daysUntil(i.deadline))})`).join("\n") || "- (none currently overdue)"}\n\nKeep it light, not naggy.`
    },
    {
      id: "qa-content-idea", icon: icon('bulb'), title: "Case study / content idea",
      desc: "Generate a fresh content angle from recent activity.",
      roles: ["Overview", "Katie"], type: "prompt",
      text: () => `Suggest one fresh case study or social content idea for Zip-Clip Ltd (wire rope suspension systems for MEP/M&E), based on recent activity. Keep it practical and specific enough to brief straight away \u2013 include a working title and a one-line angle.`
    }
  ];
  return all.filter(qa => qa.roles.includes(person));
}

// ---------- Overview ----------
function jobItems() { return state.items.filter(i => i.category === "Job Deadline" || i.category === "Customer Collaboration"); }
function socialItems() { return state.items.filter(i => i.category === "Social Post"); }
function launchItems() { return state.items.filter(i => i.category === "Product Launch"); }

function statusBar(list) {
  if (list.length === 0) return "";
  const counts = {};
  list.forEach(i => { counts[i.status] = (counts[i.status] || 0) + 1; });
  const total = list.length;
  const segs = Object.entries(counts).map(([s, n]) => `<div style="width:${(n/total*100).toFixed(2)}%;background:${STATUS_COLOR[s]||'#ccc'}" title="${s}: ${n}"></div>`).join("");
  const legend = Object.entries(counts).map(([s, n]) => `<span class="checklabel"><span class="dot" style="background:${STATUS_COLOR[s]||'#ccc'}"></span>${s} (${n})</span>`).join("");
  return `<div style="display:flex;height:10px;border-radius:5px;overflow:hidden;margin-bottom:6px;">${segs}</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;">${legend}</div>`;
}

    ["jobs", icon('jobs'), openJobs.length, "Open jobs"],

    <div class="cards">
      ${cards.map(([tab, ic, num, lbl], idx) => `<button class="card" data-goto="${tab}" style="color:${CARD_COLOR[idx % CARD_COLOR.length]}"><div>${ic}</div><div class="num" style="color:var(--charcoal)">${num}</div><div class="lbl">${lbl}</div></button>`).join("")}
    </div>
    <div class="grid2" style="margin-bottom:14px;">
      <div class="panel"><h3>Where everything sits (all regions)</h3><div class="chart-wrap"><canvas id="chartRegion"></canvas></div></div>
      <div class="panel"><h3>Mix by type${state.region!=="All"?` \u2013 ${state.region}`:""}</h3><div class="chart-wrap"><canvas id="chartCategory"></canvas></div></div>
    </div>
    <div class="panel" style="margin-bottom:14px;">
      <h3>Volume through the year${state.region!=="All"?` \u2013 ${state.region}`:""}</h3>
      <div class="chart-wrap tall"><canvas id="chartMonthly"></canvas></div>
    </div>
    <div class="grid2">
      <div class="panel">
        <h3>Coming up</h3>
        ${upcoming.length === 0 ? `<div class="empty">Nothing due soon.</div>` : `<div class="stack">${upcoming.map(i => `
          <div class="item-row" style="border:none;padding:0;">
            <span><span class="dot" style="background:${CATEGORY_COLOR[i.category]||'#ccc'}"></span>${esc(i.title)}</span>
            <span style="color:var(--charcoal-soft);font-size:12px;">${fmtDate(i.deadline)}</span>
          </div>`).join("")}</div>`}
      </div>
      <div class="panel">
        <h3>Translation queue</h3>
        ${translationQueue.length === 0 ? `<div class="empty">Nothing flagged for translation.</div>` : `<div class="stack">${translationQueue.slice(0, 6).map(i => `
          <div class="item-row" style="border:none;padding:0;">
            <span>${esc(i.title)}</span>
            <span class="tag region-${i.region}">${i.region}</span>
          </div>`).join("")}</div>`}
      </div>
    </div>`;
}

function initOverviewCharts() {
  ["chartRegion", "chartCategory", "chartMonthly"].forEach(killChart);
  const font = { family: "Open Sans", size: 11 };

  const regionCounts = { UK: 0, EU: 0, International: 0 };
  state.items.forEach(i => { regionCounts[i.region] = (regionCounts[i.region] || 0) + 1; });
  chartInstances.chartRegion = new Chart(document.getElementById('chartRegion'), {
    type: 'doughnut',
    data: { labels: Object.keys(regionCounts), datasets: [{ data: Object.values(regionCounts), backgroundColor: Object.keys(regionCounts).map(r => REGION_COLOR[r]), borderWidth: 2, borderColor: "#fff" }] },
    options: { plugins: { legend: { position: 'bottom', labels: { font, boxWidth: 10, color: "#3C3A3C" } } }, cutout: "62%" }
  });

  const scoped = state.items.filter(i => inRegion(i.region));
  const catCounts = { "Job Deadline": 0, "Social Post": 0, "Product Launch": 0, "Customer Collaboration": 0 };
  scoped.forEach(i => { if (catCounts[i.category] !== undefined) catCounts[i.category]++; });
  chartInstances.chartCategory = new Chart(document.getElementById('chartCategory'), {
    type: 'bar',
    data: { labels: Object.keys(catCounts).map(c => c.replace(" Deadline","").replace(" Post","").replace(" Launch","").replace("Customer ","")), datasets: [{ data: Object.values(catCounts), backgroundColor: Object.keys(catCounts).map(c => CATEGORY_COLOR[c]), borderRadius: 5 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { font, color: "#615F60" }, grid: { display: false } }, y: { ticks: { font, color: "#615F60" }, grid: { color: "#E7E4E1" } } } }
  });

  const monthCounts = MONTHS.map(m => 0);
  scoped.forEach(i => { const d = i.date || i.deadline; if (d) { const mi = new Date(d + "T00:00:00").getMonth(); monthCounts[mi]++; } });
  chartInstances.chartMonthly = new Chart(document.getElementById('chartMonthly'), {
    type: 'line',
    data: { labels: MONTHS.map(m => m.slice(0,3)), datasets: [{ data: monthCounts, borderColor: "#FF8200", backgroundColor: "#FF820022", fill: true, tension: 0.35, pointBackgroundColor: "#FF8200", pointRadius: 3 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { font, color: "#615F60" }, grid: { display: false } }, y: { beginAtZero: true, ticks: { font, color: "#615F60", precision: 0 }, grid: { color: "#E7E4E1" } } } }
  });
}

// ---------- Grouped item list (Jobs / Socials / Launches) ----------
function itemCard(i) {
  const catBadge = i.category ? `<span class="tag cat">${esc(i.category)}</span>` : "";
  const accent = CATEGORY_COLOR[i.category] || "#ccc";
  const overdue = itemIsOverdue(i);
  const daysLeft = daysUntil(i.deadline);
  const overdueStyle = overdue ? "background:#FFE5E5;border-left-color:#B33A3A;" : "";
  return `
  <div class="item" data-id="${i.id}" style="border-left:3px solid ${accent};${overdueStyle}">
    <div class="item-row">
      <div>
        <div class="item-title">${esc(i.title)}${overdue ? ` <span class="tag translate" style="background:#FFD7D7;color:#B33A3A;border-color:#FFB3B3;">\u26a0 ${daysLabel(daysLeft)}</span>` : ""}</div>
        <div class="item-meta">
          <span class="tag region-${i.region}">${i.region}</span>
          ${catBadge}
          ${i.platform ? `<span class="tag cat">${esc(i.platform)}</span>` : ""}
          ${i.translationNeeded ? `<span class="tag translate">${icon('globe','icon-sm')} Translation: ${esc((i.translationDocs||[]).join(", ") || "flagged")}</span>` : ""}
          ${i.owner ? `<span>${esc(i.owner)}</span>` : ""}
          ${i.deadline ? `<span style="${daysLeft !== null && daysLeft <= 7 ? 'color:#B5590A;font-weight:600;' : 'color:var(--charcoal-soft);'}">${fmtDate(i.deadline)}${daysLeft !== null ? ` (${daysLabel(daysLeft)})` : ""}</span>` : ""}
        </div>
        ${i.description ? `<div class="item-meta" style="margin-top:4px;">${esc(i.description)}</div>` : ""}
      </div>
      <div class="item-controls">
        <select class="status-sel" data-id="${i.id}" style="border-left:3px solid ${STATUS_COLOR[i.status]||'#ccc'};">${STATUSES.map(s => `<option ${s===i.status?'selected':''}>${s}</option>`).join("")}</select>
        <button class="icon-btn edit-toggle" data-id="${i.id}" title="Edit owner / region / translation">${icon('edit','icon-sm')}</button>
        <button class="icon-btn del-item" data-id="${i.id}" title="Delete">${icon('trash','icon-sm')}</button>
      </div>
    </div>
    <div class="editrow" id="edit-${i.id}">
      <select class="owner-sel" data-id="${i.id}">
        <option value="" ${!i.owner?'selected':''}>Unassigned</option>
        <option ${i.owner==='Kayleigh'?'selected':''}>Kayleigh</option>
        <option ${i.owner==='Katie'?'selected':''}>Katie</option>
      </select>
      <select class="region-sel" data-id="${i.id}">${REGIONS.map(r => `<option ${r===i.region?'selected':''}>${r}</option>`).join("")}</select>
      ${durationFieldHtml('itemhrs-'+i.id, i.estimatedHours, i.workDate)}
      <div id="itemhrs-${i.id}-hint" style="grid-column:1/-1;font-size:12px;width:100%;"></div>
      <label class="checklabel"><input type="checkbox" class="translate-chk" data-id="${i.id}" ${i.translationNeeded?'checked':''}/> Needs translation</label>
      ${DOC_TYPES.map(d => `<label class="checklabel"><input type="checkbox" class="doc-chk" data-id="${i.id}" data-doc="${d}" ${(i.translationDocs||[]).includes(d)?'checked':''} ${i.translationNeeded?'':'disabled'}/> ${d}</label>`).join("")}
    </div>
  </div>`;
}

function groupedList(list, emptyMsg, categoryFilterUI) {
  const scoped = list.filter(i => inRegion(i.region) && matchesSearch(i) && inPerson(i.owner));
  const hiddenCount = scoped.filter(i => i.status === "Complete" || i.status === "Cancelled").length;
  const filtered = state.showCompleted ? scoped : scoped.filter(i => i.status !== "Complete" && i.status !== "Cancelled");
  const byMonth = {};
  filtered.forEach(i => {
    const m = monthOf(i.date || i.deadline);
    (byMonth[m] = byMonth[m] || []).push(i);
  });
  const order = [...MONTHS, "Undated"];
  const currentMonth = MONTHS[new Date().getMonth()];
  const monthsHtml = order.filter(m => byMonth[m] && byMonth[m].length).map(m => `
    <details class="month" ${m === currentMonth ? "open" : ""}>
      <summary>${m} <span class="month-count">${byMonth[m].length}</span></summary>
      ${byMonth[m].sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map(itemCard).join("")}
    </details>`).join("");
  const toggle = hiddenCount > 0 ? `<button class="chip ${state.showCompleted?'active':''}" id="toggleCompleted" style="margin-bottom:14px;">${state.showCompleted ? `Showing all, including ${hiddenCount} completed/cancelled` : `${hiddenCount} completed/cancelled hidden, show them`}</button>` : "";
  return `${categoryFilterUI || ""}${toggle}${filtered.length === 0 ? `<div class="empty">${state.showCompleted ? emptyMsg : (scoped.length ? "Nothing outstanding, everything here is complete or cancelled." : emptyMsg)}</div>` : monthsHtml}`;
}

function refreshNewItemHint() {
  const hintEl = document.getElementById('newItem-hint');
  if (!hintEl) return;
  const owner = document.getElementById('newItemOwner')?.value;
  const workDate = document.getElementById('newItem-workdate')?.value;
  const deadline = document.getElementById('newItemDeadline')?.value;
  const hours = document.getElementById('newItem-hours')?.value;
  hintEl.innerHTML = capacityHint(owner, workDate || deadline, hours);
}

function attachAddItemHandlers(defaultCategory) {
  const saveBtn = document.getElementById('saveNewItemBtn');
  const cancelBtn = document.getElementById('cancelNewItemBtn');
  wireDurationPresets();
  refreshNewItemHint();
  ['newItemOwner','newItemDeadline','newItem-hours','newItem-workdate'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.onchange = refreshNewItemHint; el.oninput = refreshNewItemHint; }
  });
  if (saveBtn) saveBtn.onclick = () => {
    const title = document.getElementById('newItemTitle').value.trim();
    if (!title) { toast("Add a title first"); return; }
    state.items.push({
      id: uid(), date: todayISO(),
      category: document.getElementById('newItemCategory').value,
      platform: null, campaign: null,
      title,
      description: document.getElementById('newItemDescription').value.trim() || null,
      owner: document.getElementById('newItemOwner').value || null,
      status: document.getElementById('newItemStatus').value,
      deadline: document.getElementById('newItemDeadline').value || null,
      region: document.getElementById('newItemRegion').value,
      estimatedHours: parseFloat(document.getElementById('newItem-hours').value) || null,
      workDate: document.getElementById('newItem-workdate').value || null,
      translationNeeded: false, translationDocs: []
    });
    state.addFormOpen = false;
    markItemsDirty();
    toast("Added to tracker");
    renderAll();
  };
  if (cancelBtn) cancelBtn.onclick = () => { state.addFormOpen = false; renderAll(); };
}

// ---------- Requests queue ----------
const PRIORITY_COLOR = { Urgent: "#B33A3A", Standard: "#3C6E9E" };

function renderRequests() {
  const pending = pendingRequests().sort((a, b) => {
    if (a.priority !== b.priority) return a.priority === "Urgent" ? -1 : 1;
    return (a.neededBy || "9999").localeCompare(b.neededBy || "9999");
  });
  const handledCount = state.requests.length - pending.length;

  const rows = pending.map(r => {
    const key = requestKey(r);
    return `
    <div class="item" data-reqkey="${esc(key)}">
      <div class="item-row">
        <div>
          <div class="item-title">${esc(r.title)}${r.priority === "Urgent" ? ` <span class="tag" style="background:#FFE5E5;color:#B33A3A;border-color:#FFB3B3;">Urgent</span>` : ""}</div>
          <div class="item-meta">
            <span>Requested by ${esc(r.requestedBy || "Unknown")}</span>
            ${r.category ? `<span class="tag cat">${esc(r.category)}</span>` : ""}
            ${r.region ? `<span class="tag region-${r.region}">${esc(r.region)}</span>` : ""}
            ${r.neededBy ? `<span>Needed by ${fmtDate(r.neededBy)}</span>` : ""}
          </div>
          ${r.description ? `<div class="item-meta" style="margin-top:4px;">${esc(r.description)}</div>` : ""}
          ${r.attachments && r.attachments.length ? `<div class="item-meta" style="margin-top:6px;gap:6px;">${r.attachments.map((url,i)=>`<a href="${esc(url)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;color:var(--orange-deep);font-weight:600;">${icon('attach','icon-sm')}File ${i+1}</a>`).join("")}</div>` : ""}
        </div>
        <div class="item-controls">
          <button class="btn small allocate-req" data-reqkey="${esc(key)}">Allocate</button>
          <button class="icon-btn dismiss-req" data-reqkey="${esc(key)}" title="Dismiss without adding">${icon('trash','icon-sm')}</button>
        </div>
      </div>
      <div class="editrow" id="alloc-${key.replace(/[^a-zA-Z0-9]/g,'_')}"></div>
    </div>`;
  }).join("");

  return `
    <div class="section-header">
      <div class="section-title"><div class="badge-icon">${icon('requests')}</div><div><h2>Incoming requests</h2><p>${pending.length} awaiting allocation${handledCount ? ` \u2022 ${handledCount} already handled` : ""}</p></div></div>
      <button class="btn secondary" id="syncRequestsBtn">Sync requests</button>
    </div>
    ${pending.length === 0 ? `<div class="empty">No pending requests. Hit "Sync requests" to check for new submissions from the team.</div>` : `<div class="stack">${rows}</div>`}`;
}

function renderCalendar() {
  const cursor = state.calCursor;
  const year = cursor.getFullYear(), month = cursor.getMonth();
  const monthLabel = cursor.toLocaleDateString("en-GB", { month: "long", year: "numeric" });
  const firstDay = new Date(year, month, 1);
  const startOffset = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const all = [];
  state.items.filter(i => inRegion(i.region)).forEach(i => { if (i.deadline) all.push({ date: i.deadline, label: i.title, kind: i.category }); });
  state.events.filter(e => inRegion(e.region)).forEach(e => all.push({ date: e.date, label: e.name, kind: "Event" }));

  const kindColor = { "Job Deadline": "#615F60", "Social Post": "#3C6E9E", "Customer Collaboration": "#8A6D3B", "Product Launch": "#FF8200", "Event": "#2E7D6B" };

  let cells = "";
  for (let i = 0; i < startOffset; i++) cells += `<div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayEvents = all.filter(e => e.date === iso);
    const isToday = iso === todayISO();

    const cap = state.person === "Overview"
      ? Object.keys(WORKING_DAYS).reduce((s,p) => s + capacityOn(p, iso), 0)
      : capacityOn(state.person, iso);
    const due = hoursDueOn(iso, state.person);
    let capBadge = "";
    if (due > 0 || cap > 0) {
      let tone = "#615F60", bg = "#F1EFEC";
      if (cap === 0 && due > 0) { tone = "#B33A3A"; bg = "#FFE5E5"; }
      else if (due > cap) { tone = "#B33A3A"; bg = "#FFE5E5"; }
      else if (cap > 0 && due >= cap * 0.8) { tone = "#B5590A"; bg = "#FFF1E0"; }
      else if (due > 0) { tone = "#1F7A66"; bg = "#1F7A6614"; }
      capBadge = `<div style="font-size:9px;font-weight:700;color:${tone};background:${bg};border-radius:4px;padding:1px 4px;display:inline-block;margin-top:2px;">${due}h${cap?`/${cap}h`:''}</div>`;
    }

    cells += `<div class="cal-cell ${isToday?'today':''}">
      <div class="cal-day">${d}</div>
      ${capBadge}
      ${dayEvents.slice(0,2).map(e => `<div class="cal-item" style="background:${kindColor[e.kind]}22;color:${kindColor[e.kind]}" title="${esc(e.label)}">${esc(e.label)}</div>`).join("")}
      ${dayEvents.length>2?`<div style="font-size:9px;color:var(--charcoal-soft)">+${dayEvents.length-2} more</div>`:""}
    </div>`;
  }

  return `
    <div class="section-header">
      <div class="section-title"><div class="badge-icon">${icon('calendar')}</div><div><h2>Calendar</h2><p>Jobs, posts, launches and events, plus capacity for ${state.person === "Overview" ? "the team" : state.person}</p></div></div>
      <div class="cal-nav"><button class="icon-btn" id="calPrev">\u2039</button><span class="kanit" style="font-weight:600;font-size:13px;width:130px;text-align:center;display:inline-block;">${monthLabel}</span><button class="icon-btn" id="calNext">\u203a</button></div>
    </div>
    <div class="calendar-grid">${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<div class="cal-head">${d}</div>`).join("")}</div>
    <div class="calendar-grid" style="margin-top:2px;">${cells}</div>
    <div class="cal-legend">${Object.entries(kindColor).map(([k,c])=>`<span><span class="dot" style="background:${c}"></span>${k}</span>`).join("")}</div>
    <div class="cal-legend" style="margin-top:6px;">
      <span><span class="dot" style="background:#1F7A66"></span>Fits capacity</span>
      <span><span class="dot" style="background:#B5590A"></span>Getting tight (80%+)</span>
      <span><span class="dot" style="background:#B33A3A"></span>Over capacity or nobody available</span>
    </div>`;
}

function renderPerformance() {
  const posts = state.performance.filter(p => !state.searchQuery.trim() || p.title.toLowerCase().includes(state.searchQuery.toLowerCase()) || p.platform?.toLowerCase().includes(state.searchQuery.toLowerCase()));
  const topByEngagement = [...posts].sort((a,b)=>b.totalInteractions - a.totalInteractions).slice(0,10);
  const platformCounts = {};
  posts.forEach(p => { platformCounts[p.platform||"Untagged"] = (platformCounts[p.platform||"Untagged"]||0)+1; });
  const totalImpressions = posts.reduce((s,p)=>s+(p.impressions||0), 0);
  const totalInteractions = posts.reduce((s,p)=>s+(p.totalInteractions||0), 0);
  const avgEngagement = totalImpressions > 0 ? ((totalInteractions/totalImpressions)*100).toFixed(2) : 0;

  return `
    <div class="section-header"><div class="section-title"><div class="badge-icon">${icon('performance')}</div><div><h2>Performance analytics</h2><p>${posts.length} posts tracked</p></div></div></div>
    <div class="grid2" style="margin-bottom:14px;">
      <div class="panel"><h3>Total impressions</h3><div style="font-family:Kanit,sans-serif;font-size:32px;font-weight:700;color:var(--orange);margin:8px 0;">${totalImpressions.toLocaleString()}</div></div>
      <div class="panel"><h3>Average engagement rate</h3><div style="font-family:Kanit,sans-serif;font-size:32px;font-weight:700;color:#2E7D6B;margin:8px 0;">${avgEngagement}%</div></div>
    </div>
    <div class="grid2" style="margin-bottom:14px;">
      <div class="panel"><h3>Volume by platform</h3><div class="chart-wrap"><canvas id="chartPlatform"></canvas></div></div>
      <div class="panel"><h3>Top posts by interactions</h3>
        ${topByEngagement.length===0?`<div class="empty">No performance data yet.</div>`:`<div class="stack">${topByEngagement.slice(0,6).map(p=>`
          <div style="border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:6px;">
            <div style="font-weight:600;font-size:13px;color:var(--charcoal);">${esc(p.title)}</div>
            <div style="font-size:11px;color:var(--charcoal-soft);margin-top:2px;">${p.platform} • ${p.totalInteractions} interactions • ${p.impressions} impressions</div>
          </div>`).join("")}</div>`}
      </div>
    </div>
    <div class="panel"><h3>Engagement over time</h3><div class="chart-wrap tall"><canvas id="chartEngagement"></canvas></div></div>`;
}

function initPerformanceCharts() {
  ["chartPlatform", "chartEngagement"].forEach(killChart);
  const font = { family: "Open Sans", size: 11 };
  const posts = state.performance;

  const platformCounts = {};
  const platformColors = { LinkedIn: "#0A66C2", Instagram: "#E4405F", Facebook: "#1877F2", X: "#000", YouTube: "#FF0000", Email: "#FF8200" };
  posts.forEach(p => { platformCounts[p.platform||"Untagged"] = (platformCounts[p.platform||"Untagged"]||0)+1; });
  chartInstances.chartPlatform = new Chart(document.getElementById('chartPlatform'), {
    type: 'doughnut',
    data: { labels: Object.keys(platformCounts), datasets: [{ data: Object.values(platformCounts), backgroundColor: Object.keys(platformCounts).map(p=>platformColors[p]||"#ccc"), borderWidth:2, borderColor:"#fff" }] },
    options: { plugins: { legend: { position:'bottom', labels:{font, boxWidth:10, color:"#3C3A3C"} } }, cutout:"62%" }
  });

  const monthlyEngagement = MONTHS.map(m => {
    const mo = m.toLocaleLowerCase();
    const mp = posts.filter(p=>p.date && p.date.slice(5,7)===`${MONTHS.indexOf(m)+1}`.padStart(2,'0'));
    return mp.reduce((s,p)=>s+p.totalInteractions, 0);
  });
  chartInstances.chartEngagement = new Chart(document.getElementById('chartEngagement'), {
    type:'line',
    data: { labels:MONTHS.map(m=>m.slice(0,3)), datasets:[{ data:monthlyEngagement, borderColor:"#FF8200", backgroundColor:"#FF820022", fill:true, tension:0.35, pointBackgroundColor:"#FF8200", pointRadius:3 }] },
    options: { plugins:{ legend:{display:false} }, scales:{x:{ticks:{font,color:"#615F60"}, grid:{display:false}}, y:{beginAtZero:true, ticks:{font, color:"#615F60", precision:0}, grid:{color:"#E7E4E1"} } } }
  });
}

// ---------- Main render ----------
function renderAll() {
  renderShell();
  const main = document.getElementById('main');
  const renderers = { today: renderToday, requests: renderRequests, overview: renderOverview, jobs: renderJobs, socials: renderSocials, launches: renderLaunches, events: renderEvents, calendar: renderCalendar, performance: renderPerformance, trends: renderTrends, automation: renderAutomation };
  main.innerHTML = renderers[state.tab]();
  attachHandlers();
  if (state.tab === "overview") initOverviewCharts();
  if (state.tab === "performance") initPerformanceCharts();
}

function attachHandlers() {
  document.querySelectorAll('[data-goto]').forEach(b => b.onclick = () => { state.tab = b.dataset.goto; renderAll(); });

  document.querySelectorAll('[data-goto-item]').forEach(el => el.onclick = () => {
    const itemId = el.dataset.gotoItem;
    state.tab = el.dataset.gotoTab;
    state.jobCategory = "All";
    state.searchQuery = "";
    state.region = "All";
    renderAll();
    const target = document.querySelector(`.item[data-id="${itemId}"]`);
    if (target) {
      const monthDetails = target.closest('details.month');
      if (monthDetails) monthDetails.open = true;
      target.scrollIntoView({ behavior: "smooth", block: "center" });
      target.classList.add('jump-highlight');
      setTimeout(() => target.classList.remove('jump-highlight'), 2200);
    }
  });

  document.querySelectorAll('[data-chk]').forEach(c => c.onchange = () => {
    const cs = loadChecklistState();
    const arr = new Set(cs[state.person] || []);
    c.checked ? arr.add(c.dataset.chk) : arr.delete(c.dataset.chk);
    cs[state.person] = Array.from(arr);
    saveChecklistState(cs);
    renderAll();
  });

  document.querySelectorAll('[data-qa]').forEach(b => b.onclick = () => {
    const qa = quickActionsFor(state.person).find(x => x.id === b.dataset.qa);
    if (!qa) return;
    const text = qa.text();
    navigator.clipboard.writeText(text).then(() => toast(qa.type === 'inline' ? "Summary copied" : "Prompt copied \u2013 paste it into Claude"));
    const box = document.getElementById('qa-box-' + qa.id);
    if (box) { box.style.display = 'block'; box.textContent = text; }
  });

  const syncRequestsBtn = document.getElementById('syncRequestsBtn');
  if (syncRequestsBtn) syncRequestsBtn.onclick = () => syncRequestsFromGoogleSheets();
  const syncApptBtn = document.getElementById('syncApptBtn');
  if (syncApptBtn) syncApptBtn.onclick = () => syncAppointmentsFromGoogleSheets();

  const toggleAddItem = document.getElementById('toggleAddItem');
  const toggleCompleted = document.getElementById('toggleCompleted');
  if (toggleCompleted) toggleCompleted.onclick = () => { state.showCompleted = !state.showCompleted; renderAll(); };
  if (toggleAddItem) toggleAddItem.onclick = () => { state.addFormOpen = !state.addFormOpen; renderAll(); };
  if (state.addFormOpen) attachAddItemHandlers();

  document.querySelectorAll('.allocate-req').forEach(b => b.onclick = () => {
    const key = b.dataset.reqkey;
    const r = state.requests.find(x => requestKey(x) === key);
    if (!r) return;
    const safeKey = key.replace(/[^a-zA-Z0-9]/g,'_');
    const slot = document.getElementById('alloc-' + safeKey);
    if (slot) {
      const isOpen = slot.classList.contains('open');
      if (isOpen) { slot.innerHTML = ""; slot.classList.remove('open'); }
      else { slot.innerHTML = allocationFormHtml(r); slot.classList.add('open'); }
    }
    if (slot) {
      wireDurationPresets();
      refreshAllocHint(safeKey);
      [`alloc-${safeKey}-owner`, `alloc-${safeKey}-deadline`, `alloc-${safeKey}-hours`, `alloc-${safeKey}-workdate`].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.onchange = () => refreshAllocHint(safeKey); el.oninput = () => refreshAllocHint(safeKey); }
      });
      const saveBtn = slot.querySelector('.alloc-save');
      if (saveBtn) saveBtn.onclick = () => {
        const owner = slot.querySelector('.alloc-owner').value;
        const category = slot.querySelector('.alloc-category').value;
        const region = slot.querySelector('.alloc-region').value;
        const deadline = slot.querySelector('.alloc-deadline').value || null;
        const estimatedHours = parseFloat(slot.querySelector(`#alloc-${safeKey}-hours`)?.value) || null;
        const workDate = slot.querySelector(`#alloc-${safeKey}-workdate`)?.value || null;
        const attachNote = (r.attachments && r.attachments.length) ? `\n\nAttachments:\n${r.attachments.join("\n")}` : "";
        state.items.push({
          id: uid(), date: todayISO(), category, platform: null, campaign: null,
          title: r.title, description: (r.description || "") + attachNote || null, owner: owner || null,
          status: "Scheduled", deadline, region, estimatedHours, workDate, translationNeeded: false, translationDocs: []
        });
        dismissRequest(r);
        markItemsDirty();
        toast("Added to job tracker");
        renderAll();
      };
    }
  });
  document.querySelectorAll('.dismiss-req').forEach(b => b.onclick = () => {
    const r = state.requests.find(x => requestKey(x) === b.dataset.reqkey);
    if (!r) return;
    dismissRequest(r);
    toast("Request dismissed");
    renderAll();
  });
  document.querySelectorAll('[data-jobcat]').forEach(b => b.onclick = () => { state.jobCategory = b.dataset.jobcat; renderAll(); });

  document.querySelectorAll('.status-sel').forEach(s => s.onchange = () => {
    const it = state.items.find(x => x.id === s.dataset.id); if (it) it.status = s.value; markItemsDirty(); renderAll();
  });
  document.querySelectorAll('.edit-toggle').forEach(b => b.onclick = () => {
    document.getElementById('edit-' + b.dataset.id).classList.toggle('open');
  });
  document.querySelectorAll('.owner-sel').forEach(s => s.onchange = () => {
    const it = state.items.find(x => x.id === s.dataset.id); if (it) it.owner = s.value || null; markItemsDirty(); renderAll();
  });
  wireDurationPresets();
  document.querySelectorAll('[id^="itemhrs-"][id$="-hours"]').forEach(inp => {
    const itemId = inp.id.replace(/^itemhrs-/,'').replace(/-hours$/,'');
    const workDateInp = document.getElementById(`itemhrs-${itemId}-workdate`);
    const refreshItemHint = () => {
      const hintEl = document.getElementById(`itemhrs-${itemId}-hint`);
      const it = state.items.find(x => x.id === itemId);
      const ownerSel = document.querySelector(`.owner-sel[data-id="${itemId}"]`);
      if (hintEl && it) hintEl.innerHTML = capacityHint(ownerSel ? ownerSel.value : it.owner, (workDateInp && workDateInp.value) || it.deadline, inp.value);
    };
    inp.oninput = refreshItemHint;
    inp.onchange = () => {
      const it = state.items.find(x => x.id === itemId);
      if (it) it.estimatedHours = parseFloat(inp.value) || null;
      markItemsDirty();
      renderAll();
    };
    if (workDateInp) {
      workDateInp.oninput = refreshItemHint;
      workDateInp.onchange = () => {
        const it = state.items.find(x => x.id === itemId);
        if (it) it.workDate = workDateInp.value || null;
        markItemsDirty();
        renderAll();
      };
    }
    refreshItemHint();
  });
  document.querySelectorAll('.region-sel').forEach(s => s.onchange = () => {
    const it = state.items.find(x => x.id === s.dataset.id); if (it) it.region = s.value; markItemsDirty(); renderAll();
  });
  document.querySelectorAll('.translate-chk').forEach(c => c.onchange = () => {
    const it = state.items.find(x => x.id === c.dataset.id); if (it) it.translationNeeded = c.checked; markItemsDirty(); renderAll();
  });
  document.querySelectorAll('.doc-chk').forEach(c => c.onchange = () => {
    const it = state.items.find(x => x.id === c.dataset.id); if (!it) return;
    const set = new Set(it.translationDocs || []);

// ---------- Master spreadsheet (xlsx) import / export ----------
const ITEM_HEADERS = ["ID","Date","Category","Platform","Campaign","Title","Description","Owner","Status","Deadline","Region","Translation Needed","Translation Docs","Estimated Hours","Work Date"];
const EVENT_HEADERS = ["ID","Name","Date","Region","Location","Notes"];
const IDEA_HEADERS = ["ID","Title","Platform","Campaign","Priority","Owner","Status","Target Month","Notes"];

function importMasterXlsx(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
      if (wb.SheetNames.includes("Items")) {
        const rows = XLSX.utils.sheet_to_json(wb.Sheets["Items"], { defval: "" });
        state.items = rows.filter(r => r.Title || r.Category).map(r => ({
          id: String(r.ID || uid()),
          date: String(r.Date || "").trim() || null,
          category: String(r.Category || "").trim(),
          platform: String(r.Platform || "").trim() || null,
          campaign: String(r.Campaign || "").trim() || null,
          title: String(r.Title || "").trim() || "Untitled",
          description: String(r.Description || "").trim() || null,
          owner: String(r.Owner || "").trim() || null,
          status: String(r.Status || "").trim() || "Scheduled",
          deadline: String(r.Deadline || "").trim() || null,
          region: REGIONS.includes(String(r.Region || "").trim()) ? String(r.Region).trim() : "UK",
          translationNeeded: String(r["Translation Needed"] || "").trim().toUpperCase() === "Y",
          translationDocs: String(r["Translation Docs"] || "").split(",").map(s => s.trim()).filter(Boolean),
          estimatedHours: r["Estimated Hours"] ? Number(r["Estimated Hours"]) : null,
          workDate: String(r["Work Date"] || "").trim() || null
        }));
      }
      if (wb.SheetNames.includes("Events")) {
        const rows = XLSX.utils.sheet_to_json(wb.Sheets["Events"], { defval: "" });
        state.events = rows.filter(r => r.Name).map(r => ({
          id: String(r.ID || uid()), name: String(r.Name || ""), date: String(r.Date || "") || null,
          region: REGIONS.includes(String(r.Region||"").trim()) ? String(r.Region).trim() : "UK",
          location: String(r.Location || ""), notes: String(r.Notes || "")
        }));
      }
      if (wb.SheetNames.includes("Ideas")) {
        const rows = XLSX.utils.sheet_to_json(wb.Sheets["Ideas"], { defval: "" });
        state.ideas = rows.filter(r => r.Title).map(r => ({
          id: String(r.ID || uid()), title: String(r.Title || ""), platform: String(r.Platform || ""),
          campaign: String(r.Campaign || ""), priority: String(r.Priority || ""), owner: String(r.Owner || ""),
          status: String(r.Status || "Backlog"), targetMonth: String(r["Target Month"] || ""), notes: String(r.Notes || "")
        }));
      }
      renderAll();
      markItemsDirty();

    }
  };

}

function exportMasterXlsx() {

  }));

// ---------- Google Sheets sync ----------
function syncFromGoogleSheets(silent) {
  if (!state.gsSheetId) { if (silent) return; const id = prompt("Paste your Google Sheet ID (from the URL):"); if (!id) return; state.gsSheetId = id; localStorage.setItem("zipclip_gs_sheet_id", id); }
  // If something changed locally in the last 10 seconds, skip a silent background pull,
  // it may not have finished publishing yet, and we don't want to overwrite it with
  // slightly-stale Sheet data. A manual sync (silent=false) always proceeds regardless,
  // that's an explicit "give me what's on the Sheet right now" request.
  if (silent && Date.now() - state.lastLocalItemsEdit < 10000) return;
  const sheetUrl = `https://docs.google.com/spreadsheets/d/${state.gsSheetId}/gviz/tq?tqx=out:json&sheet=Items`;
  fetch(sheetUrl).then(r=>r.text()).then(text=>{
    try {
      const json = JSON.parse(text.slice(47,-2));
      if (!json.table || !json.table.rows || json.table.rows.length === 0) {
        if (!silent) toast(state.items.length ? "No Items tab found, your current list is untouched" : "No Items tab found yet");
        return;
      }
      state.items = json.table.rows.map((r,i)=>{
        const c = r.c;
        return { id: c[0]?.v||`it${i}`, date: parseGvizDate(c[1]?.v)||null, category: c[2]?.v||null, platform: c[3]?.v||null, campaign: c[4]?.v||null, title: c[5]?.v||"", description: c[6]?.v||null, owner: c[7]?.v||null, status: c[8]?.v||"Scheduled", deadline: parseGvizDate(c[9]?.v)||null, region: c[10]?.v||"UK", translationNeeded: c[11]?.v==="Y", translationDocs: (c[12]?.v||"").split(",").map(d=>d.trim()).filter(Boolean), estimatedHours: c[13]?.v ? Number(c[13].v) : null, workDate: c[14]?.v ? parseGvizDate(c[14].v) : null };
      });
      renderAll();
      if (!silent) toast("Synced from Google Sheets");
    } catch (e) { if (!silent) toast("Couldn't sync: check the Sheet ID and share settings"); }
  }).catch(e=>{ if (!silent) toast("Network error syncing"); });
}

// ---------- Items sync back to the Sheet (so jobs added on one device show up on another) ----------
let itemsPublishTimer = null;
function markItemsDirty() {
  state.lastLocalItemsEdit = Date.now();
  if (!state.appsScriptUrl) return;
  if (itemsPublishTimer) clearTimeout(itemsPublishTimer);

  itemsPublishTimer = setTimeout(publishItemsSnapshot, 2000);

}

// ---------- Appointments sheet sync (a shared "Appointments" tab you both add rows to) ----------
// Expected columns: Date (YYYY-MM-DD), Time, Title, Person (Kayleigh/Katie/Both), Notes
// Google Sheets returns date-typed cells as a literal "Date(y,m,d)" string via this feed,
// not a normal date string, this unpacks that into a plain YYYY-MM-DD string.
function parseGvizDate(v) {
  if (!v) return "";
  if (typeof v === "string" && v.startsWith("Date(")) {
    const nums = v.match(/-?\d+/g);
    if (!nums) return "";
    const [y, m, d] = nums.map(Number);
    return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
  }
  return String(v).slice(0, 10);
}

function parseTimeToMinutes(t) {
  if (!t) return 9999;
  const m = String(t).trim().match(/(\d{1,2}):?(\d{2})?\s*(am|pm)?/i);
  if (!m) return 9999;
  let h = parseInt(m[1], 10);
  const min = m[2] ? parseInt(m[2], 10) : 0;
  const ap = m[3] ? m[3].toLowerCase() : null;
  if (ap === "pm" && h < 12) h += 12;
  if (ap === "am" && h === 12) h = 0;
  return h * 60 + min;
}
function apptMatchesPerson(a) {
  if (state.person === "Overview") return true;
  if (!a.person || a.person.toLowerCase() === "both") return true;
  return a.person.toLowerCase().includes(state.person.toLowerCase());
}
// Same matching logic as apptMatchesPerson, but takes an explicit person instead of
// reading the global filter, needed anywhere capacity gets checked for a specific
// person regardless of which view is currently selected (e.g. the allocation form).
function apptForPerson(a, person) {
  if (person === "Overview") return true;
  if (!a.person || a.person.toLowerCase() === "both") return true;
  return a.person.toLowerCase().includes(person.toLowerCase());
}
// Reads a duration out of the appointment's time field. Handles a range like
// "10:00-10:30"; a single time with no range gets a 1 hour placeholder, since we
// don't know how long a one-off meeting runs otherwise.
function appointmentHours(a) {
  if (!a.time) return 1;
  const parts = String(a.time).split(/[-\u2013]/).map(s => s.trim()).filter(Boolean);
  if (parts.length === 2) {
    const start = parseTimeToMinutes(parts[0]);
    const end = parseTimeToMinutes(parts[1]);
    if (start !== 9999 && end !== 9999 && end > start) return Math.round(((end - start) / 60) * 4) / 4;
  }
  return 1;
}
function thisWeeksAppointments() {
  const today = new Date(todayISO() + "T00:00:00");
  const dow = today.getDay(); // 0=Sun...6=Sat
  const daysToSunday = dow === 0 ? 0 : 7 - dow;
  const endOfWeek = new Date(today); endOfWeek.setDate(today.getDate() + daysToSunday);
  const endIso = endOfWeek.toISOString().slice(0, 10);
  return state.appointments
    .filter(a => a.date >= todayISO() && a.date <= endIso && apptMatchesPerson(a))
    .sort((a, b) => a.date === b.date ? parseTimeToMinutes(a.time) - parseTimeToMinutes(b.time) : a.date.localeCompare(b.date));
}
function syncAppointmentsFromGoogleSheets(silent) {
  if (!state.gsSheetId) { if (silent) return; const id = prompt("Paste your Google Sheet ID (from the URL):"); if (!id) return; state.gsSheetId = id; localStorage.setItem("zipclip_gs_sheet_id", id); }
  const sheetUrl = `https://docs.google.com/spreadsheets/d/${state.gsSheetId}/gviz/tq?tqx=out:json&sheet=Appointments`;
  fetch(sheetUrl).then(r=>r.text()).then(text=>{
    try {
      const json = JSON.parse(text.slice(47,-2));
      if (!json.table || !json.table.rows) { if (!silent) toast("No Appointments tab found yet"); return; }
      state.appointments = json.table.rows.map(r=>{
        const c = r.c;
        const dateVal = parseGvizDate(c[0]?.v);
        return {
          date: dateVal,
          time: c[1]?.v || "",
          title: c[2]?.v || "Untitled",
          person: c[3]?.v || "Both",
          notes: c[4]?.v || ""
        };
      }).filter(a => a.date && a.title);
      renderAll();
      if (!silent) toast(`Synced ${state.appointments.length} appointments`);
    } catch (e) { if (!silent) toast("Couldn't sync appointments: check the Sheet ID and share settings"); }
  }).catch(e=>{ if (!silent) toast("Network error syncing appointments"); });
}

  `;
  head.appendChild(wrap);
  document.getElementById('toolsToggle').onclick = (e) => { e.stopPropagation(); document.getElementById('toolsPanel').classList.toggle('open'); };
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('toolsPanel');
    if (panel && !e.target.closest('.tools-menu')) panel.classList.remove('open');
  });
  document.getElementById('exportXlsxBtn').onclick = exportMasterXlsx;
  document.getElementById('importXlsxInput').onchange = (e) => { if (e.target.files[0]) importMasterXlsx(e.target.files[0]); };
  document.getElementById('exportPdfBtn').onclick = exportPDF;
  document.getElementById('syncGsBtn').onclick = () => syncFromGoogleSheets();
  document.getElementById('capacityUrlBtn').onclick = (e) => {
    const url = prompt("Paste your Apps Script Web app URL (the same one used in the job request form):", state.appsScriptUrl || "");
    if (url === null) return;
    state.appsScriptUrl = url.trim();
    localStorage.setItem("zipclip_apps_script_url", state.appsScriptUrl);
    e.target.textContent = `${state.appsScriptUrl ? "Update" : "Connect"} capacity publishing`;
    if (state.appsScriptUrl) { publishCapacitySnapshot(); toast("Capacity publishing connected"); }
    else toast("Capacity publishing disconnected");
  };
  document.getElementById('publishItemsBtn').onclick = () => {
    if (!state.appsScriptUrl) { toast("Connect capacity publishing first, it uses the same URL"); return; }
    if (!state.items.length) { toast("Nothing to publish, your list is empty"); return; }
    state.lastLocalItemsEdit = Date.now();
    publishItemsSnapshot();
    toast(`Publishing ${state.items.length} items to the Sheet\u2026`);
  };
  document.getElementById('exportBtn').onclick = exportData;
  document.getElementById('importInput').onchange = (e) => { if (e.target.files[0]) importData(e.target.files[0]); };
}

addHeaderButtons();
renderAll();
if (state.gsSheetId) {
  syncAppointmentsFromGoogleSheets();
  syncRequestsFromGoogleSheets();
  syncFromGoogleSheets(true);
}
if (state.appsScriptUrl) publishCapacitySnapshot();

// Keep everything fresh in the background so nobody has to remember to click sync.
// Runs every 5 minutes while the tab is open; only fires when a Sheet ID is set,
// and stays quiet unless something actually changed (new requests get a toast).
// The Items pull is guarded two ways: it never overwrites your list with an empty
// result, and it skips itself if you made a local change in the last 10 seconds,
// so it can't clobber an edit that hasn't finished publishing yet.
setInterval(() => {
  if (state.gsSheetId) {
    syncAppointmentsFromGoogleSheets(true);
    syncRequestsFromGoogleSheets(true);
    syncFromGoogleSheets(true);
  }
  if (state.appsScriptUrl) publishCapacitySnapshot();
}, 5 * 60 * 1000);

</script>
</body>
</html>
